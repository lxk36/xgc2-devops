  release-layer-11:
    name: layer 11 / ${{ matrix.product_id }} / ${{ matrix.action }}
    needs: [version-bump, release-layer-1, release-layer-2, release-layer-3, release-layer-4, release-layer-5, release-layer-6, release-layer-7, release-layer-8, release-layer-9, release-layer-10]
    if: >-
      ${{
        always() &&
        inputs.execute &&
        needs.version-bump.outputs.layer_11_count != '0' &&
        (needs.version-bump.outputs.layer_1_count == '0' || needs.release-layer-1.result == 'success') &&
        (needs.version-bump.outputs.layer_2_count == '0' || needs.release-layer-2.result == 'success') &&
        (needs.version-bump.outputs.layer_3_count == '0' || needs.release-layer-3.result == 'success') &&
        (needs.version-bump.outputs.layer_4_count == '0' || needs.release-layer-4.result == 'success') &&
        (needs.version-bump.outputs.layer_5_count == '0' || needs.release-layer-5.result == 'success') &&
        (needs.version-bump.outputs.layer_6_count == '0' || needs.release-layer-6.result == 'success') &&
        (needs.version-bump.outputs.layer_7_count == '0' || needs.release-layer-7.result == 'success') &&
        (needs.version-bump.outputs.layer_8_count == '0' || needs.release-layer-8.result == 'success') &&
        (needs.version-bump.outputs.layer_9_count == '0' || needs.release-layer-9.result == 'success') &&
        (needs.version-bump.outputs.layer_10_count == '0' || needs.release-layer-10.result == 'success')
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.version-bump.outputs.layer_11_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: xgc2-release-plan
          path: .work
      - name: Trigger and wait for product release
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN }}
        run: |
          python3 scripts/run-release-plan-product.py \
            --plan .work/release-plan.json \
            --product "${{ matrix.product_id }}" \
            ${{ inputs.quality_required && '--quality-required' || '' }} \
            ${{ inputs.source_tests && '--source-tests' || '' }}

  release-layer-12:
    name: layer 12 / ${{ matrix.product_id }} / ${{ matrix.action }}
    needs: [version-bump, release-layer-1, release-layer-2, release-layer-3, release-layer-4, release-layer-5, release-layer-6, release-layer-7, release-layer-8, release-layer-9, release-layer-10, release-layer-11]
    if: >-
      ${{
        always() &&
        inputs.execute &&
        needs.version-bump.outputs.layer_12_count != '0' &&
        (needs.version-bump.outputs.layer_1_count == '0' || needs.release-layer-1.result == 'success') &&
        (needs.version-bump.outputs.layer_2_count == '0' || needs.release-layer-2.result == 'success') &&
        (needs.version-bump.outputs.layer_3_count == '0' || needs.release-layer-3.result == 'success') &&
        (needs.version-bump.outputs.layer_4_count == '0' || needs.release-layer-4.result == 'success') &&
        (needs.version-bump.outputs.layer_5_count == '0' || needs.release-layer-5.result == 'success') &&
        (needs.version-bump.outputs.layer_6_count == '0' || needs.release-layer-6.result == 'success') &&
        (needs.version-bump.outputs.layer_7_count == '0' || needs.release-layer-7.result == 'success') &&
        (needs.version-bump.outputs.layer_8_count == '0' || needs.release-layer-8.result == 'success') &&
        (needs.version-bump.outputs.layer_9_count == '0' || needs.release-layer-9.result == 'success') &&
        (needs.version-bump.outputs.layer_10_count == '0' || needs.release-layer-10.result == 'success') &&
        (needs.version-bump.outputs.layer_11_count == '0' || needs.release-layer-11.result == 'success')
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.version-bump.outputs.layer_12_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: xgc2-release-plan
          path: .work
      - name: Trigger and wait for product release
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN }}
        run: |
          python3 scripts/run-release-plan-product.py \
            --plan .work/release-plan.json \
            --product "${{ matrix.product_id }}" \
            ${{ inputs.quality_required && '--quality-required' || '' }} \
            ${{ inputs.source_tests && '--source-tests' || '' }}

  top-level-verify:
    name: top-level / verify
    needs:
      - version-bump
      - release-layer-1
      - release-layer-2
      - release-layer-3
      - release-layer-4
      - release-layer-5
      - release-layer-6
      - release-layer-7
      - release-layer-8
      - release-layer-9
      - release-layer-10
      - release-layer-11
      - release-layer-12
    if: ${{ always() && inputs.execute && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: xgc2-release-plan
          path: .work
      - name: Check layer results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          bad = {
              name: data.get("result")
              for name, data in needs.items()
              if data.get("result") not in ("success", "skipped")
          }
          if bad:
              print("failed release dependency jobs:", bad)
              sys.exit(1)
          PY
      - name: Summarize final release lock
        run: |
          {
            echo "## Final release lock"
            echo
            echo '```json'
            cat .work/release-lock.json
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
