name: release-orchestrator

on:
  workflow_dispatch:
    inputs:
      products:
        description: Comma-separated seed product ids. Empty means all APT products.
        required: false
        default: ""
      groups:
        description: Comma-separated seed product groups, e.g. gazebo-sim, simulator, sitl.
        required: false
        default: ""
      changed_from:
        description: Optional git base ref for changed-product detection.
        required: false
        default: ""
      changed_to:
        description: Git head ref for changed-product detection.
        required: false
        default: HEAD
      include_downstream:
        description: Include reverse dependency closure.
        required: true
        default: true
        type: boolean
      execute:
        description: Trigger product workflows. False performs a dry-run plan only.
        required: true
        default: false
        type: boolean
      quality_required:
        description: Treat C++ quality jobs as release-blocking.
        required: true
        default: false
        type: boolean
      source_tests:
        description: Request source tests from workflows that support this input.
        required: true
        default: false
        type: boolean

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Checkout product metadata submodules
        env:
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}
        run: |
          set -euo pipefail
          repo_root="$(git rev-parse --show-toplevel)"
          cd "${repo_root}"

          if [[ -n "${SUBMODULE_SSH_KEY:-}" ]]; then
            install -m 0700 -d "${HOME}/.ssh"
            key_file="${HOME}/.ssh/xgc2-submodule-key"
            printf '%s\n' "${SUBMODULE_SSH_KEY}" > "${key_file}"
            chmod 0600 "${key_file}"
            ssh-keyscan github.com >> "${HOME}/.ssh/known_hosts"
            git config --global core.sshCommand "ssh -i ${key_file} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          else
            git config --global url."https://github.com/".insteadOf git@github.com:
          fi

          submodules=(
            products/common/acados
            products/common/math
            products/common/mavlink-router
            products/common/state-machine
            products/common/tbb
            products/ros1/common/ros1-utils
            products/ros1/communication/runtime-sync
            products/ros1/driver/livox_ros_driver
            products/ros1/driver/livox_ros_driver2
            products/ros1/manager/linux-utils
            products/ros1/perception/detection
            products/ros1/perception/slam
            products/ros1/planner/planner
            products/ros1/simulator/convex_geometry
            products/ros1/simulator/gazebo-sim
            products/ros1/simulator/swarm-sync-sim
            products/ros1_dev
            products/ros2/simulator/px4-sitl-116
          )

          for submodule_path in "${submodules[@]}"; do
            if ! git ls-files -s "${submodule_path}" | grep -q '^160000 '; then
              echo "::warning title=Submodule not indexed::${submodule_path} is not a gitlink in this revision"
              continue
            fi
            if ! git submodule update --init --recursive --depth=1 "${submodule_path}"; then
              echo "::warning title=Submodule checkout failed::${submodule_path} could not be checked out; catalog will continue with available products"
            fi
          done

      - name: Install metadata dependencies
        run: |
          python3 -m pip install --user --no-cache-dir PyYAML jsonschema

      - name: Collect product catalog
        run: |
          python3 scripts/collect-products.py --root . --output .work/release-products.json

      - name: Plan or execute release DAG
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN }}
        run: |
          set -euo pipefail
          args=(
            --root .
            --catalog .work/release-products.json
            --changed-to "${{ inputs.changed_to }}"
          )

          if [[ -n "${{ inputs.products }}" ]]; then
            args+=(--product "${{ inputs.products }}")
          fi
          if [[ -n "${{ inputs.groups }}" ]]; then
            args+=(--group "${{ inputs.groups }}")
          fi
          if [[ -n "${{ inputs.changed_from }}" ]]; then
            args+=(--changed-from "${{ inputs.changed_from }}")
          fi
          if [[ "${{ inputs.include_downstream }}" != "true" ]]; then
            args+=(--no-downstream)
          fi
          if [[ "${{ inputs.execute }}" == "true" ]]; then
            if [[ -z "${GH_TOKEN:-}" ]]; then
              echo "XGC2_RELEASE_ORCHESTRATOR_TOKEN is required when execute=true" >&2
              exit 1
            fi
            args+=(--execute)
          fi
          if [[ "${{ inputs.quality_required }}" == "true" ]]; then
            args+=(--quality-required)
          fi
          if [[ "${{ inputs.source_tests }}" == "true" ]]; then
            args+=(--source-tests)
          fi

          python3 scripts/orchestrate-apt-release.py "${args[@]}"

      - name: Upload release plan
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-release-plan
          path: .work/release-plan.json
