        (needs.version-bump.outputs.layer_2_count == '0' || needs.release-layer-2.result == 'success') &&
        (needs.version-bump.outputs.layer_3_count == '0' || needs.release-layer-3.result == 'success') &&
        (needs.version-bump.outputs.layer_4_count == '0' || needs.release-layer-4.result == 'success') &&
