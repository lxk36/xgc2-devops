name: release-orchestrator

on:
  workflow_dispatch:
    inputs:
      products:
        description: Comma-separated seed product ids. Empty means all APT products.
        required: false
        default: ""
      groups:
        description: Comma-separated seed groups, e.g. uav-tracking, ugv-tracking, gazebo-sim.
        required: false
        default: ""
      changed_from:
        description: Optional git base ref for changed-product detection.
        required: false
        default: ""
      changed_to:
        description: Git head ref for changed-product detection.
        required: false
        default: HEAD
      include_upstream:
        description: Include prerequisite dependency closure.
        required: true
        default: true
        type: boolean
      include_downstream:
        description: Include reverse dependency closure.
        required: true
        default: true
        type: boolean
      bump_release_versions:
        description: Plan release targets with the next Debian revision.
        required: true
        default: true
        type: boolean
      release_version_series:
        description: Promote 1.0.x release products into this series before publishing.
        required: false
        default: "1.1"
      commit_version_bumps:
        description: Commit and push product version bumps before executing release jobs.
        required: true
        default: true
        type: boolean
      execute:
        description: Trigger product release workflows. False performs a dry-run plan only.
        required: true
        default: false
        type: boolean
      quality_required:
        description: Treat C++ quality jobs as release-blocking.
        required: true
        default: false
        type: boolean
      source_tests:
        description: Request source tests from workflows that support this input.
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  plan:
    name: release / plan
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout product metadata submodules
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN }}
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}
        run: bash scripts/checkout-product-metadata-submodules.sh

      - name: Install metadata dependencies
        run: python3 -m pip install --user --no-cache-dir PyYAML jsonschema

      - name: Collect product catalog
        run: python3 scripts/collect-products.py --root . --output .work/release-products.json

      - name: Plan release DAG
        run: |
          set -euo pipefail
          args=(
            --root .
            --catalog .work/release-products.json
            --changed-to "${{ inputs.changed_to }}"
            --plan-output .work/release-plan.json
            --lock-output .work/release-lock.json
            --summary-output .work/release-plan.md
          )

          if [[ -n "${{ inputs.products }}" ]]; then
            args+=(--product "${{ inputs.products }}")
          fi
          if [[ -n "${{ inputs.groups }}" ]]; then
            args+=(--group "${{ inputs.groups }}")
          fi
          if [[ -n "${{ inputs.changed_from }}" ]]; then
            args+=(--changed-from "${{ inputs.changed_from }}")
          fi
          if [[ "${{ inputs.include_upstream }}" != "true" ]]; then
            args+=(--no-upstream)
          fi
          if [[ "${{ inputs.include_downstream }}" != "true" ]]; then
            args+=(--no-downstream)
          fi
          if [[ "${{ inputs.bump_release_versions }}" == "true" ]]; then
            args+=(--bump-release-versions)
          fi
          if [[ -n "${{ inputs.release_version_series }}" ]]; then
            args+=(--release-version-series "${{ inputs.release_version_series }}")
          fi

          python3 scripts/orchestrate-apt-release.py "${args[@]}"

      - name: Show release DAG
        if: always() && hashFiles('.work/release-plan.md') != ''
        run: cat .work/release-plan.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload preliminary release plan
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-release-prep
          path: |
            .work/release-products.json
            .work/release-plan.json
            .work/release-lock.json
            .work/release-plan.md

  version-bump:
    name: version-bump / release-lock
    needs: plan
    runs-on: ubuntu-latest
    outputs:
      layer_count: ${{ steps.layer_outputs.outputs.layer_count }}
      layer_1_count: ${{ steps.layer_outputs.outputs.layer_1_count }}
      layer_1_matrix: ${{ steps.layer_outputs.outputs.layer_1_matrix }}
      layer_2_count: ${{ steps.layer_outputs.outputs.layer_2_count }}
      layer_2_matrix: ${{ steps.layer_outputs.outputs.layer_2_matrix }}
      layer_3_count: ${{ steps.layer_outputs.outputs.layer_3_count }}
      layer_3_matrix: ${{ steps.layer_outputs.outputs.layer_3_matrix }}
      layer_4_count: ${{ steps.layer_outputs.outputs.layer_4_count }}
      layer_4_matrix: ${{ steps.layer_outputs.outputs.layer_4_matrix }}
      layer_5_count: ${{ steps.layer_outputs.outputs.layer_5_count }}
      layer_5_matrix: ${{ steps.layer_outputs.outputs.layer_5_matrix }}
      layer_6_count: ${{ steps.layer_outputs.outputs.layer_6_count }}
      layer_6_matrix: ${{ steps.layer_outputs.outputs.layer_6_matrix }}
      layer_7_count: ${{ steps.layer_outputs.outputs.layer_7_count }}
      layer_7_matrix: ${{ steps.layer_outputs.outputs.layer_7_matrix }}
      layer_8_count: ${{ steps.layer_outputs.outputs.layer_8_count }}
      layer_8_matrix: ${{ steps.layer_outputs.outputs.layer_8_matrix }}
      layer_9_count: ${{ steps.layer_outputs.outputs.layer_9_count }}
      layer_9_matrix: ${{ steps.layer_outputs.outputs.layer_9_matrix }}
      layer_10_count: ${{ steps.layer_outputs.outputs.layer_10_count }}
      layer_10_matrix: ${{ steps.layer_outputs.outputs.layer_10_matrix }}
      layer_11_count: ${{ steps.layer_outputs.outputs.layer_11_count }}
      layer_11_matrix: ${{ steps.layer_outputs.outputs.layer_11_matrix }}
      layer_12_count: ${{ steps.layer_outputs.outputs.layer_12_count }}
      layer_12_matrix: ${{ steps.layer_outputs.outputs.layer_12_matrix }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN || github.token }}

      - uses: actions/download-artifact@v4
        with:
          name: xgc2-release-prep
          path: .work

      - name: Checkout product metadata submodules
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN }}
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}
        run: bash scripts/checkout-product-metadata-submodules.sh

      - name: Install metadata dependencies
        run: python3 -m pip install --user --no-cache-dir PyYAML

      - name: Configure git author
        run: |
          git config --global user.name "xgc2-release-bot"
          git config --global user.email "xgc2-release-bot@users.noreply.github.com"

      - name: Validate release dispatch token
        if: ${{ inputs.execute }}
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::error::XGC2_RELEASE_ORCHESTRATOR_TOKEN is required to dispatch and watch child repository release workflows."
            exit 1
          fi
          gh auth status >/dev/null

      - name: Apply release version bumps
        run: |
          set -euo pipefail
          args=(
            --root .
            --plan .work/release-plan.json
            --lock-output .work/release-lock.json
          )
          if [[ "${{ inputs.execute }}" == "true" && "${{ inputs.commit_version_bumps }}" == "true" && "${{ inputs.bump_release_versions }}" == "true" ]]; then
            args+=(--tracked-lock-output catalog/generated/latest-release-lock.json)
            args+=(--apply --commit --push)
          fi
          python3 scripts/apply-release-version-bumps.py "${args[@]}"

      - name: Build layer matrices
        id: layer_outputs
        run: |
          python3 scripts/release-plan-github-outputs.py \
            --plan .work/release-plan.json \
            --max-layers 12 >> "${GITHUB_OUTPUT}"

      - name: Show release lock
        run: |
          {
            echo "## Release lock"
            echo
            echo '```json'
            cat .work/release-lock.json
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload final release plan
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-release-plan
          path: |
            .work/release-plan.json
            .work/release-lock.json

  release-layer-1:
    name: layer 1 / ${{ matrix.product_id }} / ${{ matrix.action }}
    needs: version-bump
    if: ${{ inputs.execute && needs.version-bump.outputs.layer_1_count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.version-bump.outputs.layer_1_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: xgc2-release-plan
          path: .work
      - name: Trigger and wait for product release
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN }}
        run: |
          python3 scripts/run-release-plan-product.py \
            --plan .work/release-plan.json \
            --product "${{ matrix.product_id }}" \
            ${{ inputs.quality_required && '--quality-required' || '' }} \
            ${{ inputs.source_tests && '--source-tests' || '' }}

  release-layer-2:
    name: layer 2 / ${{ matrix.product_id }} / ${{ matrix.action }}
    needs: [version-bump, release-layer-1]
    if: >-
      ${{
        always() &&
        inputs.execute &&
        needs.version-bump.outputs.layer_2_count != '0' &&
        (needs.version-bump.outputs.layer_1_count == '0' || needs.release-layer-1.result == 'success')
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.version-bump.outputs.layer_2_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: xgc2-release-plan
          path: .work
      - name: Trigger and wait for product release
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN }}
        run: |
