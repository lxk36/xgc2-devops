name: release-orchestrator

on:
  workflow_dispatch:
    inputs:
      products:
        description: Comma-separated seed product ids; empty means all APT products.
        required: false
        default: ""
      groups:
        description: Comma-separated seed groups such as ugv-tracking or gazebo-sim.
        required: false
        default: ""
      changed_from:
        description: Optional git base ref for changed-product detection.
        required: false
        default: ""
      changed_to:
        description: Git head ref for changed-product detection.
        required: false
        default: HEAD
      include_upstream:
        required: true
        default: true
        type: boolean
      include_downstream:
        required: true
        default: true
        type: boolean
      bump_release_versions:
        required: true
        default: true
        type: boolean
      release_version_series:
        required: false
        default: "1.1"
      commit_version_bumps:
        required: true
        default: true
        type: boolean
      execute:
        description: False creates and validates a dry-run plan only.
        required: true
        default: false
        type: boolean
      quality_required:
        required: true
        default: false
        type: boolean
      source_tests:
        required: true
        default: false
        type: boolean
      reuse_ci_artifacts:
        description: Reuse exact-SHA trusted push CI artifacts when available.
        required: true
        default: true
        type: boolean
      max_parallel:
        description: Maximum number of dependency-ready product releases.
        required: true
        default: 4
        type: number
      resume_run_id:
        description: Optional prior orchestrator run whose release-state artifact should be resumed.
        required: false
        default: ""

permissions:
  actions: read
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN || github.token }}
      - name: Checkout product metadata submodules
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN }}
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}
        run: bash scripts/checkout-product-metadata-submodules.sh
      - name: Install metadata dependencies
        run: python3 -m pip install --user --no-cache-dir PyYAML jsonschema
      - name: Validate control inputs
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.resume_run_id }}" && "${{ inputs.execute }}" != true ]]; then
            echo "resume_run_id requires execute=true" >&2
            exit 2
          fi
      - name: Download exact resume evidence
        if: ${{ inputs.execute && inputs.resume_run_id != '' }}
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN || github.token }}
        run: |
          set -euo pipefail
          mkdir -p .work/resume
          gh run download "${{ inputs.resume_run_id }}" \
            --repo "${{ github.repository }}" \
            --name xgc2-release-state \
            --dir .work/resume
          for name in release-products.json release-plan.json release-lock.json release-state.json; do
            if [[ ! -s ".work/resume/${name}" ]]; then
              echo "resume run is missing ${name}" >&2
              exit 2
            fi
            cp ".work/resume/${name}" ".work/${name}"
          done
          if [[ -f .work/resume/release-plan.md ]]; then
            cp .work/resume/release-plan.md .work/release-plan.md
          else
            printf '# Resumed XGC2 release\n\nPrior run: `%s`\n' \
              "${{ inputs.resume_run_id }}" > .work/release-plan.md
          fi
          if [[ -d .work/resume/release-node-checkpoints ]]; then
            cp -a .work/resume/release-node-checkpoints .work/
          fi
          cat .work/release-plan.md >> "$GITHUB_STEP_SUMMARY"
      - name: Build and validate release plan
        if: ${{ inputs.resume_run_id == '' }}
        run: |
          set -euo pipefail
          if [[ "${{ inputs.execute }}" == true &&
                "${{ inputs.bump_release_versions }}" == true &&
                "${{ inputs.commit_version_bumps }}" != true ]]; then
            echo "execute with bump_release_versions requires commit_version_bumps" >&2
            exit 2
          fi
          python3 scripts/collect-products.py --root . --output .work/release-products.json
          args=(--root . --catalog .work/release-products.json --changed-to "${{ inputs.changed_to }}" --plan-output .work/release-plan.json --lock-output .work/release-lock.json --summary-output .work/release-plan.md)
          [[ -z "${{ inputs.products }}" ]] || args+=(--product "${{ inputs.products }}")
          [[ -z "${{ inputs.groups }}" ]] || args+=(--group "${{ inputs.groups }}")
          [[ -z "${{ inputs.changed_from }}" ]] || args+=(--changed-from "${{ inputs.changed_from }}")
          [[ "${{ inputs.include_upstream }}" == true ]] || args+=(--no-upstream)
          [[ "${{ inputs.include_downstream }}" == true ]] || args+=(--no-downstream)
          [[ "${{ inputs.bump_release_versions }}" != true ]] || args+=(--bump-release-versions)
          [[ -z "${{ inputs.release_version_series }}" ]] || args+=(--release-version-series "${{ inputs.release_version_series }}")
          python3 scripts/orchestrate-apt-release.py "${args[@]}"
          python3 scripts/validate-release-plan.py --root . --plan .work/release-plan.json --catalog .work/release-products.json --allow-planned-updates
          cat .work/release-plan.md >> "$GITHUB_STEP_SUMMARY"
      - name: Configure release bot
        if: ${{ inputs.execute && inputs.resume_run_id == '' && inputs.commit_version_bumps && inputs.bump_release_versions }}
        run: |
          git config --global user.name xgc2-release-bot
          git config --global user.email xgc2-release-bot@users.noreply.github.com
      - name: Apply and push release lock
        if: ${{ inputs.execute && inputs.resume_run_id == '' && inputs.commit_version_bumps && inputs.bump_release_versions }}
        run: python3 scripts/apply-release-version-bumps.py --root . --plan .work/release-plan.json --lock-output .work/release-lock.json --tracked-lock-output catalog/generated/latest-release-lock.json --apply --commit --push
      - name: Validate final immutable release lock
        if: ${{ inputs.execute && inputs.resume_run_id == '' }}
        run: python3 scripts/validate-release-plan.py --root . --plan .work/release-plan.json --catalog .work/release-products.json
      - name: Execute dependency-ready queue
        if: ${{ inputs.execute }}
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN }}
          XGC2_RELEASE_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          export XGC2_RELEASE_LOCK_DIGEST="$(sha256sum .work/release-lock.json | awk '{print $1}')"
          args=(--plan .work/release-plan.json --lock .work/release-lock.json --state .work/release-state.json --max-parallel "${{ inputs.max_parallel }}")
          [[ "${{ inputs.quality_required }}" != true ]] || args+=(--quality-required)
          [[ "${{ inputs.source_tests }}" != true ]] || args+=(--source-tests)
          [[ "${{ inputs.reuse_ci_artifacts }}" != true ]] || args+=(--reuse-ci-artifacts)
          [[ ! -f .work/resume/release-state.json ]] || args+=(--resume-state .work/resume/release-state.json)
          python3 scripts/schedule-release-plan.py "${args[@]}"
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-release-state
          path: |
            .work/release-products.json
            .work/release-plan.json
            .work/release-lock.json
            .work/release-plan.md
            .work/release-state.json
            .work/release-node-checkpoints
          if-no-files-found: ignore
