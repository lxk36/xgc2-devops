name: catalog

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout product metadata submodules
        run: |
          git submodule update --init --depth=1 \
            products/ros1/common/acados \
            products/ros1/common/state-machine \
            products/ros1/common/tbb \
            products/ros1/manager/linux-utils \
            products/ros1/perception/estimator-hover-thrust \
            products/ros1/simulator/agilex \
            products/ros1/simulator/gazebo-sim \
            products/ros1/simulator/px4-sitl-112 \
            products/ros1/simulator/px4-sitl-114 \
            products/ros1/simulator/swarm-sync-sim \
            products/ros2/px4-sitl-116

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install validator dependencies
        run: python3 -m pip install PyYAML jsonschema

      - name: Collect product metadata
        run: |
          python3 scripts/collect-products.py \
            --root . \
            --output catalog/generated/products.json
