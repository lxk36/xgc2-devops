name: catalog

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  validate:
    name: catalog / validate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Checkout product metadata submodules
        env:
          GH_TOKEN: ${{ secrets.XGC2_RELEASE_ORCHESTRATOR_TOKEN }}
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}
        run: bash scripts/checkout-product-metadata-submodules.sh

      - name: Install metadata dependencies
        run: python3 -m pip install --user --no-cache-dir PyYAML jsonschema

      - name: Run lightweight repository validation
        run: |
          set -euo pipefail
          bash -n scripts/*.sh helper/*.sh
          python3 -m py_compile \
            scripts/apply-release-version-bumps.py \
            scripts/audit-product-workflows.py \
            scripts/cleanup-product-apt-secrets.py \
            scripts/orchestrate-apt-release.py \
            scripts/release-train-publisher.py \
            scripts/release-plan-github-outputs.py \
            scripts/run-release-plan-product.py \
            scripts/schedule-release-plan.py \
            scripts/stage-product-release.py \
            scripts/validate-release-plan.py \
            scripts/summarize-product-catalog.py
          python3 scripts/collect-products.py --root . --output .work/products-ci.json
          python3 scripts/summarize-product-catalog.py \
            --root . \
            --catalog .work/products-ci.json \
            --output .work/product-module-catalog.md
          python3 scripts/orchestrate-apt-release.py \
            --root . \
            --catalog .work/products-ci.json \
            --group gazebo-sim \
            --plan-output .work/release-plan-gazebo-sim.json \
            --lock-output .work/release-lock-gazebo-sim.json \
            --summary-output .work/release-plan-gazebo-sim.md
          python3 scripts/orchestrate-apt-release.py \
            --root . \
            --catalog .work/products-ci.json \
            --group uav-tracking \
            --plan-output .work/release-plan-uav-tracking.json \
            --lock-output .work/release-lock-uav-tracking.json \
            --summary-output .work/release-plan-uav-tracking.md
          python3 scripts/orchestrate-apt-release.py \
            --root . \
            --catalog .work/products-ci.json \
            --plan-output .work/release-plan-full-audit.json \
            --lock-output .work/release-lock-full-audit.json
          python3 scripts/validate-release-plan.py \
            --root . \
            --catalog .work/products-ci.json \
            --plan .work/release-plan-full-audit.json
          python3 scripts/audit-product-workflows.py \
            --root . \
            --catalog .work/products-ci.json \
            --output-json .work/product-workflow-audit.json \
            --output-md .work/product-workflow-audit.md \
            --fail-on-error
          python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Show product module catalog
        run: |
          cat .work/product-module-catalog.md >> "${GITHUB_STEP_SUMMARY}"
          cat .work/release-plan-uav-tracking.md >> "${GITHUB_STEP_SUMMARY}"
          cat .work/product-workflow-audit.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload catalog plans
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-catalog-summary
          path: |
            .work/products-ci.json
            .work/product-module-catalog.md
            .work/release-plan-gazebo-sim.json
            .work/release-lock-gazebo-sim.json
            .work/release-plan-gazebo-sim.md
            .work/release-plan-uav-tracking.json
            .work/release-lock-uav-tracking.json
            .work/release-plan-uav-tracking.md
            .work/release-plan-full-audit.json
            .work/release-lock-full-audit.json
            .work/product-workflow-audit.json
            .work/product-workflow-audit.md
